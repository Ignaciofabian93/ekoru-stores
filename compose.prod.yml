name: 'ekoru-stores-prod'

services:
  ekoru-stores:
    image: ekoru-stores:prod
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: ekoru-stores
    env_file:
      - .env.prod
    ports:
      - '4103:4003'
    networks:
      - ekoru-network
    deploy:
      resources:
        limits:
          cpus: '2.0' # Maximum 2 CPU cores (production environment)
          memory: 1G # Maximum 1GB RAM (production environment)
        reservations:
          cpus: '0.5' # Minimum 0.5 CPU cores reserved
          memory: 512M # Minimum 512MB RAM reserved
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4103/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ekoru-network:
    external: true
